apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clusters-applicationset
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/devops-tashtiot/clusters-definition
    targetRevision: eks-migration
    path: .
    directory:
      include: applicationset.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
