apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: clusters-apps
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/devops-tashtiot/clusters-provision
        revision: main
        directories:
          - path: clusters/*
  template:
    metadata:
      name: '{{path.basename}}'
      namespace: argocd
    spec:
      project: default
      sources:
        - repoURL: https://github.com/devops-tashtiot/clusters-provision
          targetRevision: main
          path: '{{path}}'
          helm:
            valueFiles:
              - values.yaml
              - $definition/clusters/{{path.basename}}/values.yaml
        - repoURL: https://github.com/devops-tashtiot/clusters-definition
          targetRevision: main
          ref: definition
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
#      syncPolicy:
#        automated:
#          prune: true
#          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
      # external-secrets-operator's admission webhook server-side-defaults
      # fields onto ExternalSecret objects that aren't in the chart templates
      # (conversionStrategy/decodingStrategy/metadataPolicy per data entry,
      # deletionPolicy on target) — without this, ArgoCD reports OutOfSync
      # forever even though the secret sync itself succeeds.
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - '.spec.target.deletionPolicy'
            - '.spec.data[].remoteRef.conversionStrategy'
            - '.spec.data[].remoteRef.decodingStrategy'
            - '.spec.data[].remoteRef.metadataPolicy'
