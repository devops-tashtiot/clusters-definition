# Environment-specific overrides for RHBK/Keycloak (minikube environment).
# Merged on top of clusters-provision/clusters/rhbk/values.yaml by ArgoCD.

ingress:
  host: "rhbk.devopstashtiot.page"
  className: nginx

# Shared devtools-rds instance (devtools-labs/terraform/live/devtools/rds).
# TODO: verify against `terragrunt output -raw address` once the rds unit
# applies — this mirrors the hostname devtools-definition/devtools/confluence
# already uses for the same instance.
rds:
  host: "devtools-rds.cdwso8c8c8zk.il-central-1.rds.amazonaws.com"
  port: 5432
  database: rhbk

rdsAdmin:
  usernameSsmParameter: "/devtools/rds/admin-username"
  passwordSsmParameter: "/devtools/rds/admin-password"

adminPasswordSsmParameter: "/devtools/admin/password"

# Domain controller's LDAP endpoint, addressed via SSM rather than a literal
# IP/hostname (the private IP changes if the instance is ever replaced).
# devtools-labs/terraform/modules/domain-controller writes
# ldap://<current-private-ip>:389 to this SSM parameter on every apply — a
# private Route53 hosted zone was tried first, but this account's Horizon LZ
# org-wide SCP has an explicit deny on route53:CreateHostedZone, so SSM
# indirection is the fallback. If devtools-labs/terraform/live/devtools/domain-controller
# hasn't applied yet, the wait-for-domain-controller initContainer just polls
# an unset host and never completes — the intended "block until AD is
# actually reachable" behavior, not a bug.
ldap:
  connectionUrlSsmParameter: "/devtools/domain-controller/ldap-connection-url"
  # From devtools-labs/terraform/modules/domain-controller: OU=<ou_name>,<base_dn>
  # where ou_name defaults to "devops-tashtiot" and base_dn is derived from
  # domain_name="devtools.local" -> "DC=devtools,DC=local".
  usersDn: "OU=devops-tashtiot,DC=devtools,DC=local"

# Matches domain-controller's ldap_bind_username_ssm_parameter /
# ldap_bind_password_ssm_parameter defaults — the domain controller populates
# these SSM parameters (out-of-band, before it applies) with the svc-devops-tashtiot
# bind account's sAMAccountName and password; RHBK reads the exact same path,
# so neither value is ever a literal in git. See
# clusters-provision/clusters/rhbk/templates/set-ldap-credentials-job.yaml
# for how they get wired into Keycloak's LDAP federation provider.
ldapBind:
  usernameSsmParameter: "/devtools/domain-controller/ldap-bind-username"
  passwordSsmParameter: "/devtools/domain-controller/ldap-bind-password"

argocdClient:
  clientId: "argocd"
  redirectUri: "https://argocd.devopstashtiot.page/auth/callback"
  # Confidential client (publicClient: false in realm-import.yaml). The
  # realm-import CR intentionally does NOT set a secret — Keycloak assigns
  # a random one on creation, then templates/set-client-secret-job.yaml
  # overwrites it via the Admin REST API with the real value from
  # /devtools/rhbk/argocd-client-secret (ExternalSecret-synced, never
  # committed to git). See that template's header comment for the full flow.
  secretSsmParameter: "/devtools/rhbk/argocd-client-secret"
