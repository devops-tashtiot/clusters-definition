# EKS-only environment. All three values below are pinned to fixed,
# predictable names in devtools-labs/terraform/modules/eks (not left to
# auto-generate) specifically so they can be hardcoded here from the start —
# same convention as other AWS-specific committed values across this
# platform (e.g. devtools-definition/devtools/artifactory/values.yaml's S3
# bucket name/region). Nothing to look up or copy in after `terraform apply`.

karpenter:
  settings:
    clusterName: "devtools-eks"
    interruptionQueue: "devtools-eks-karpenter-interruption"

wrapper:
  nodeIamRoleName: "devtools-eks-karpenter-node"
