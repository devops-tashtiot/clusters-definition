wrapper:
  # SSM Parameter Store paths (SecureString) holding the Cloudflare Origin
  # Certificate used as this controller's default TLS cert (see
  # clusters-provision/clusters/ingress-nginx/templates/origin-cert-secret.yaml).
  # The parameters themselves are populated out-of-band (Cloudflare Dashboard >
  # SSL/TLS > Origin Server > Create Certificate, then aws ssm put-parameter),
  # same convention as every other secret in this project.
  originCert:
    crtSsmParameter: "/devtools/cloudflare/origin-cert-crt"
    keySsmParameter: "/devtools/cloudflare/origin-cert-key"

# Tells the controller which Secret to present by default on its 443
# listener for hosts without their own per-Ingress TLS block (i.e. every
# devtool Ingress on this platform) — must match origin-cert-secret.yaml's
# target Secret name/namespace.
ingress-nginx:
  controller:
    extraArgs:
      default-ssl-certificate: "ingress-nginx/ingress-nginx-origin-cert"
